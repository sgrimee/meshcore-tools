[project]
name = "lma"
version = "0.1.0"
description = "letsmesh analyzer — node database and live packet monitor"
readme = "README.md"
requires-python = ">=3.13"
dependencies = ["textual>=0.80", "msgpack>=1.0", "pycryptodome>=3.19"]

[project.optional-dependencies]
map = ["textual-image", "staticmap", "Pillow"]

[project.scripts]
lma = "lma.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lma"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "ruff>=0.15.7",
    "ty>=0.0.24",
]
