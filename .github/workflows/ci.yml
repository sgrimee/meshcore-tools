name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  check:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - uses: extractions/setup-just@v2
      - run: uv sync --all-extras
      - run: just check

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - uses: extractions/setup-just@v2
      - run: uv sync --all-extras
      - run: just test
